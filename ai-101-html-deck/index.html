<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 101 for Small Business Owners</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --charcoal: #0f1713;
      --charcoal-2: #16231d;
      --panel: #1c2a24;
      --panel-2: #23352d;
      --paper: #f3eee4;
      --paper-2: #e6dccb;
      --ink: #f8f1e7;
      --muted: #a9b9ae;
      --muted-2: #73857b;
      --line: rgba(214, 198, 166, .24);
      --line-strong: rgba(214, 198, 166, .42);
      --brass: #d0a34a;
      --red: #c96e5f;
      --green: #8eb09a;
      --white: #fffaf0;
      --shadow: 0 30px 90px rgba(3, 7, 5, .48);
      --radius: 6px;
      --sans: "Aptos", "Segoe UI", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(214, 198, 166, .035) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(90deg, rgba(214, 198, 166, .035) 1px, transparent 1px) 0 0 / 34px 34px,
        radial-gradient(circle at 18% 18%, rgba(208, 163, 74, .15), transparent 28rem),
        radial-gradient(circle at 82% 74%, rgba(142, 176, 154, .13), transparent 30rem),
        var(--charcoal);
      font-family: var(--sans);
      min-height: 100vh;
      overflow: hidden;
    }

    a { color: inherit; }

    .deck-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 14px;
      padding: 20px;
    }

    .stage {
      width: min(100%, calc((100vh - 98px) * 16 / 9));
      aspect-ratio: 16 / 9;
      margin: auto;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      padding: 38px 48px 34px;
      background:
        linear-gradient(rgba(214, 198, 166, .05) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(90deg, rgba(214, 198, 166, .04) 1px, transparent 1px) 0 0 / 28px 28px,
        radial-gradient(circle at 11% 14%, rgba(208, 163, 74, .14), transparent 25rem),
        linear-gradient(145deg, #111914 0%, #17241e 58%, #101713 100%);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
    }

    .slide.active { display: grid; }

    .slide::before {
      content: "";
      position: absolute;
      inset: 15px;
      border: 1px solid rgba(214, 198, 166, .14);
      pointer-events: none;
    }

    .slide::after {
      content: "";
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 26px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
      pointer-events: none;
    }

    h1,
    h2,
    h3,
    p,
    ul,
    ol {
      margin: 0;
    }

    .slide-topline,
    .slide-number,
    .label,
    .eyebrow {
      letter-spacing: .13em;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 850;
    }

    .slide-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      min-height: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .brand-lockup,
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .kicker { color: var(--brass); }

    .icon-box {
      width: 25px;
      height: 25px;
      border: 1px solid rgba(208, 163, 74, .62);
      display: grid;
      place-items: center;
      color: var(--brass);
      flex: 0 0 auto;
      background: rgba(208, 163, 74, .08);
    }

    svg {
      width: 1em;
      height: 1em;
      stroke-width: 1.8;
    }

    .icon-box svg { font-size: 15px; }

    .slide-number {
      position: absolute;
      right: 48px;
      bottom: 34px;
      color: var(--muted-2);
      z-index: 2;
    }

    .title,
    .topic-title,
    .cover-title {
      font-family: var(--serif);
      font-weight: 800;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .title {
      font-size: clamp(32px, 4.35vw, 57px);
      line-height: .96;
      max-width: 930px;
    }

    .topic-title {
      font-size: clamp(42px, 6vw, 78px);
      line-height: .92;
      max-width: 980px;
    }

    .cover-title {
      font-size: clamp(46px, 7vw, 92px);
      line-height: .88;
      max-width: 780px;
    }

    .lead {
      color: var(--muted);
      font-size: 22px;
      line-height: 1.32;
      font-weight: 620;
      max-width: 760px;
      text-wrap: pretty;
    }

    .takeaway {
      color: var(--brass);
      font-size: 24px;
      line-height: 1.16;
      font-weight: 850;
      max-width: 820px;
      align-self: end;
    }

    .cover-layout,
    .briefing-layout,
    .split-layout,
    .cta-layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 26px;
      min-height: 0;
    }

    .cover-body {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 42px;
      align-items: center;
      min-height: 0;
    }

    .cover-copy,
    .hero-copy {
      display: grid;
      gap: 22px;
      align-content: center;
    }

    .credential-panel,
    .blueprint-panel,
    .quote-panel,
    .qr-card {
      border: 1px solid var(--line);
      background: rgba(28, 42, 36, .72);
      box-shadow: inset 0 1px 0 rgba(255, 250, 240, .06);
    }

    .credential-panel {
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .credential-panel h2 {
      font-size: 17px;
      color: var(--brass);
    }

    .credential-list,
    .artifact-list {
      list-style: none;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .credential-list li,
    .artifact-list li {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 12px;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.22;
      font-weight: 720;
    }

    .credential-list li::before,
    .artifact-list li::before {
      content: "";
      width: 9px;
      height: 9px;
      margin-top: 7px;
      background: var(--brass);
    }

    .blueprint-panel {
      min-height: 380px;
      padding: 22px;
      display: grid;
      gap: 14px;
      align-content: stretch;
    }

    .blueprint-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
      color: var(--muted);
    }

    .diagram-node {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      gap: 13px;
      border: 1px solid rgba(214, 198, 166, .18);
      background: rgba(15, 23, 19, .42);
      padding: 13px;
      min-height: 64px;
    }

    .diagram-node .node-icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(208, 163, 74, .48);
      color: var(--brass);
      font-size: 21px;
    }

    .diagram-node strong {
      font-size: 18px;
      line-height: 1.16;
    }

    .node-index {
      color: var(--muted-2);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .agenda-track,
    .process-rail,
    .roadmap-grid {
      display: grid;
      gap: 12px;
    }

    .agenda-track {
      grid-template-columns: repeat(7, 1fr);
      align-items: stretch;
      margin-top: 12px;
    }

    .agenda-step,
    .process-step,
    .roadmap-card,
    .artifact-card,
    .formula-item,
    .rule-card,
    .question-card,
    .field-card,
    .tool-table td,
    .tool-table th,
    .compare-card,
    .score-item {
      border: 1px solid var(--line);
      background: rgba(28, 42, 36, .66);
    }

    .agenda-step {
      min-height: 235px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .agenda-step span,
    .rule-card span,
    .roadmap-card span {
      color: var(--brass);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    .agenda-step strong {
      font-size: 18px;
      line-height: 1.12;
    }

    .split-body {
      display: grid;
      grid-template-columns: .94fr 1.06fr;
      gap: 34px;
      align-items: center;
      min-height: 0;
    }

    .artifact-grid,
    .risk-grid,
    .score-grid,
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
      margin-top: 22px;
    }

    .artifact-grid.compact {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .artifact-card,
    .score-item {
      min-height: 96px;
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    .artifact-card svg,
    .score-item svg {
      color: var(--brass);
      font-size: 24px;
    }

    .artifact-card strong,
    .score-item strong {
      font-size: 20px;
      line-height: 1.12;
    }

    .risk-grid .artifact-card svg {
      color: var(--red);
    }

    .leak-map {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 22px;
    }

    .leak-row {
      display: grid;
      grid-template-columns: 46px 1fr 42px;
      align-items: center;
      gap: 14px;
      min-height: 72px;
      padding: 13px 15px;
      border: 1px solid rgba(201, 110, 95, .36);
      background: rgba(201, 110, 95, .08);
    }

    .leak-row span:first-child {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(201, 110, 95, .72);
      color: var(--red);
      font-weight: 900;
    }

    .leak-row strong {
      font-size: 22px;
      line-height: 1.14;
    }

    .process-rail {
      grid-template-columns: repeat(5, 1fr);
      margin-top: 26px;
    }

    .process-step {
      min-height: 155px;
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .process-step::before {
      content: attr(data-step);
      color: var(--brass);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .process-step strong {
      font-size: 20px;
      line-height: 1.15;
    }

    .statement-layout {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .statement-rule {
      place-self: center;
      max-width: 1050px;
      font-family: var(--serif);
      font-size: clamp(64px, 9vw, 116px);
      line-height: .88;
      text-align: center;
      color: var(--paper);
      text-wrap: balance;
    }

    .statement-layout .artifact-grid {
      grid-template-columns: repeat(3, 1fr);
      margin-top: 0;
    }

    .tool-table {
      width: 100%;
      margin-top: 26px;
      border-collapse: separate;
      border-spacing: 0 10px;
    }

    .tool-table th {
      text-align: left;
      color: var(--brass);
      padding: 0 16px 8px;
      background: transparent;
      border: 0;
    }

    .tool-table td {
      padding: 17px 16px;
      font-size: 23px;
      line-height: 1.15;
      font-weight: 720;
    }

    .tool-table td:first-child {
      color: var(--paper);
      font-weight: 900;
      width: 34%;
    }

    .formula-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 28px;
    }

    .formula-item {
      min-height: 96px;
      padding: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--brass);
      font-size: 18px;
      line-height: 1.1;
      font-weight: 900;
    }

    .prompt-box {
      margin-top: 22px;
      border-left: 5px solid var(--brass);
      background: rgba(243, 238, 228, .08);
      padding: 19px 22px;
      color: var(--paper);
      font-size: 22px;
      line-height: 1.34;
      font-weight: 660;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: .82fr 1.18fr;
      gap: 18px;
      margin-top: 24px;
    }

    .compare-card {
      min-height: 280px;
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .compare-card.weak {
      border-color: rgba(201, 110, 95, .4);
    }

    .compare-card strong {
      color: var(--brass);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 900;
    }

    .compare-card p {
      font-size: 28px;
      line-height: 1.18;
      font-weight: 760;
    }

    .rule-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 26px;
    }

    .rule-card {
      min-height: 188px;
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 24px;
    }

    .rule-card strong {
      font-size: 20px;
      line-height: 1.13;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: .78fr 1.22fr;
      gap: 22px;
      margin-top: 24px;
    }

    .demo-box {
      border: 1px solid var(--line);
      background: rgba(28, 42, 36, .66);
      padding: 20px;
      display: grid;
      gap: 14px;
      align-content: start;
      min-height: 260px;
    }

    .demo-box.scenario {
      border-left: 5px solid var(--green);
    }

    .demo-box.prompt {
      border-left: 5px solid var(--brass);
    }

    .demo-box p {
      font-size: 25px;
      line-height: 1.24;
      font-weight: 720;
    }

    .question-list {
      display: grid;
      gap: 12px;
      max-width: 980px;
      margin-top: 26px;
    }

    .question-card {
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 16px;
      min-height: 62px;
      padding: 10px 16px;
      font-size: 26px;
      line-height: 1.12;
      font-weight: 760;
    }

    .question-card span {
      color: var(--brass);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .field-grid {
      grid-template-columns: repeat(2, 1fr);
      margin-top: 26px;
    }

    .field-card {
      min-height: 62px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--brass);
      color: var(--paper);
      font-size: 21px;
      line-height: 1.14;
      font-weight: 760;
    }

    .roadmap-grid {
      grid-template-columns: repeat(4, 1fr);
      margin-top: 26px;
    }

    .roadmap-card {
      min-height: 242px;
      padding: 18px;
      display: grid;
      align-content: space-between;
      gap: 18px;
      border-top: 5px solid var(--brass);
    }

    .roadmap-card strong {
      font-size: 24px;
      line-height: 1.08;
    }

    .cta-body {
      display: grid;
      grid-template-columns: 1fr 330px;
      align-items: center;
      gap: 38px;
      min-height: 0;
    }

    .cta-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .cta-button,
    button,
    .link-button {
      min-height: 40px;
      border: 1px solid rgba(208, 163, 74, .54);
      background: rgba(208, 163, 74, .16);
      color: var(--paper);
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .cta-button {
      min-height: 52px;
      padding: 0 20px;
      background: var(--brass);
      color: #111914;
      border-color: var(--brass);
      font-size: 16px;
    }

    .cta-button:hover,
    button:hover,
    .link-button:hover {
      transform: translateY(-1px);
      background: rgba(208, 163, 74, .28);
      border-color: var(--brass);
    }

    .cta-button:hover {
      background: #e0b55d;
    }

    button:active,
    .link-button:active,
    .cta-button:active {
      transform: translateY(0) scale(.99);
    }

    button:focus-visible,
    .link-button:focus-visible,
    .cta-button:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(208, 163, 74, .68);
      outline-offset: 3px;
    }

    .qr-card {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15, 23, 19, .9) 9px, transparent 9px) 0 0 / 36px 36px,
        linear-gradient(rgba(15, 23, 19, .9) 9px, transparent 9px) 0 0 / 36px 36px,
        var(--paper);
      position: relative;
    }

    .qr-card::before {
      content: "";
      position: absolute;
      inset: 31px;
      background: rgba(243, 238, 228, .94);
      border: 2px solid #111914;
    }

    .qr-card span {
      position: relative;
      z-index: 1;
      color: #111914;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
    }

    .qr-card img {
      position: relative;
      z-index: 1;
      width: min(78%, 235px);
      height: auto;
      background: var(--paper);
      padding: 10px;
      border: 2px solid #111914;
    }

    .placeholder-note {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .controls {
      width: min(100%, calc((100vh - 98px) * 16 / 9));
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .progress {
      height: 7px;
      border: 1px solid rgba(214, 198, 166, .15);
      background: rgba(15, 23, 19, .72);
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--brass));
      transition: width .2s ease;
    }

    .notes-panel {
      position: fixed;
      right: 20px;
      top: 20px;
      width: min(430px, calc(100vw - 40px));
      max-height: calc(100vh - 40px);
      overflow: auto;
      padding: 20px;
      background: #121b16;
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
    }

    .notes-panel.open { display: block; }

    .notes-panel h2 {
      color: var(--brass);
      font-size: 17px;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .notes-panel p {
      color: var(--paper-2);
      line-height: 1.45;
      font-size: 15px;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted-2) !important;
      font-size: 12px !important;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .deck-shell { padding: 10px; }
      .stage,
      .controls { width: 100%; }
      .slide {
        position: relative;
        min-height: 70vh;
        padding: 24px;
      }
      .slide-topline {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 8px 14px;
      }
      .slide-topline .brand-lockup {
        grid-column: 1;
        grid-row: 1;
      }
      .slide-topline .kicker {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-self: start;
      }
      .slide-topline > span:last-child {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }
      .slide:not(.active) { display: none; }
      .slide::before,
      .slide::after,
      .slide-number { display: none; }
      .cover-body,
      .split-body,
      .demo-grid,
      .cta-body,
      .compare-grid {
        grid-template-columns: 1fr;
      }
      .agenda-track,
      .process-rail,
      .roadmap-grid,
      .artifact-grid.compact,
      .statement-layout .artifact-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .artifact-grid,
      .risk-grid,
      .score-grid,
      .field-grid,
      .leak-map,
      .formula-row,
      .rule-grid {
        grid-template-columns: 1fr;
      }
      .blueprint-panel { min-height: 260px; }
      .title { font-size: 31px; }
      .topic-title { font-size: 40px; }
      .cover-title { font-size: 46px; }
      .controls { grid-template-columns: 1fr; }
    }

    @media print {
      body {
        background: white;
        overflow: visible;
      }
      .deck-shell {
        display: block;
        padding: 0;
      }
      .stage {
        width: 100%;
        height: auto;
        aspect-ratio: auto;
      }
      .slide {
        display: grid !important;
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        page-break-after: always;
        box-shadow: none;
      }
      .controls,
      .notes-panel {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="deck-shell">
    <section class="stage" id="stage" aria-label="AI 101 slide deck"></section>
    <nav class="controls" aria-label="Presentation controls">
      <div class="button-row">
        <button id="prev" type="button" aria-label="Previous slide">Prev</button>
        <button id="next" type="button" aria-label="Next slide">Next</button>
        <button id="notesToggle" type="button" aria-label="Toggle speaker notes">Notes</button>
      </div>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="button-row">
        <a class="link-button" href="speaker-notes.html">Speaker notes</a>
        <a class="link-button" href="worksheet.html">Worksheet</a>
      </div>
    </nav>
  </main>
  <aside class="notes-panel" id="notesPanel" aria-live="polite"></aside>

  <script src="slides.js"></script>
  <script>
    const stage = document.getElementById("stage");
    const notesPanel = document.getElementById("notesPanel");
    const progressBar = document.getElementById("progressBar");
    const config = window.deckConfig || {};
    let current = 0;

    const icons = {
      user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8",
      map: "M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z M9 3v15 M15 6v15",
      clock: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2",
      alert: "M10.3 3.9L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z M12 9v4 M12 17h.01",
      target: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z",
      spark: "M12 2l2.2 6.8H21l-5.5 4 2.1 6.8L12 15.4l-5.6 4.2 2.1-6.8L3 8.8h6.8L12 2z",
      workflow: "M6 3h6v6H6z M12 6h4a2 2 0 0 1 2 2v3 M18 15v6 M15 18h6 M6 15h6v6H6z M9 9v6",
      bolt: "M13 2L3 14h8l-2 8 10-12h-8l2-8z",
      x: "M18 6L6 18 M6 6l12 12",
      shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M9 12l2 2 4-5",
      tool: "M14.7 6.3a4 4 0 0 0-5 5L3 18v3h3l6.7-6.7a4 4 0 0 0 5-5l-3 3-3-3 3-3z",
      message: "M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z",
      compare: "M17 1l4 4-4 4 M3 5h18 M7 23l-4-4 4-4 M21 19H3",
      list: "M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01",
      briefcase: "M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1 M3 7h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M3 12h18",
      building: "M3 21h18 M5 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16 M9 7h1 M14 7h1 M9 11h1 M14 11h1 M9 15h1 M14 15h1",
      layout: "M3 3h18v18H3z M3 9h18 M9 21V9",
      reply: "M9 17l-5-5 5-5 M4 12h11a5 5 0 0 1 0 10h-1",
      follow: "M17 1l4 4-4 4 M3 11V9a4 4 0 0 1 4-4h14 M7 23l-4-4 4-4 M21 13v2a4 4 0 0 1-4 4H3",
      megaphone: "M3 11v2a2 2 0 0 0 2 2h2l4 5v-5l8 3V6l-8 3H5a2 2 0 0 0-2 2z M19 8a4 4 0 0 1 0 8",
      checklist: "M9 11l2 2 4-4 M9 17l2 2 4-4 M4 5h16 M4 11h1 M4 17h1",
      search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.3-4.3",
      clipboard: "M9 3h6l1 2h3v16H5V5h3z M9 12l2 2 4-4 M9 17h6",
      edit: "M12 20h9 M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z",
      hands: "M8 11l-3 3a3 3 0 0 0 4 4l2-2 M16 11l3 3a3 3 0 0 1-4 4l-2-2 M8 11l4 4 4-4 M12 15V3",
      calendar: "M8 2v4 M16 2v4 M3 8h18 M5 4h14a2 2 0 0 1 2 2v15H3V6a2 2 0 0 1 2-2z",
      qr: "M3 3h7v7H3z M14 3h7v7h-7z M3 14h7v7H3z M14 14h2v2h-2z M18 14h3v3h-3z M14 18h3v3h-3z M19 20h2v1h-2z",
      question: "M9.1 9a3 3 0 1 1 5.8 1c-.6 1.4-2.9 2-2.9 4 M12 18h.01"
    };

    function icon(name) {
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${icons[name] || icons.spark}"/></svg>`;
    }

    function topLine(slide, index) {
      return `<div class="slide-topline">
        <span class="brand-lockup">AI workflow architecture</span>
        <span class="kicker"><span class="icon-box">${icon(slide.icon)}</span>${slide.kicker}</span>
        <span>${String(index + 1).padStart(2, "0")} / ${window.deckSlides.length}</span>
      </div>`;
    }

    function slideNumber(index) {
      return `<span class="slide-number">${String(index + 1).padStart(2, "0")} / ${window.deckSlides.length}</span>`;
    }

    function takeaway(slide) {
      return slide.bottom ? `<p class="takeaway">${slide.bottom}</p>` : "";
    }

    function artifactCards(items, iconName = "spark", className = "") {
      return `<div class="artifact-grid ${className}">${items.map((item) => `
        <article class="artifact-card">
          ${icon(iconName)}
          <strong>${item}</strong>
        </article>`).join("")}</div>`;
    }

    function blueprintPanel(title, items, iconName = "workflow") {
      return `<aside class="blueprint-panel">
        <div class="blueprint-title"><span class="label">${title}</span><span>Operating view</span></div>
        ${items.slice(0, 5).map((item, i) => `
          <div class="diagram-node">
            <span class="node-icon">${icon(iconName)}</span>
            <strong>${item}</strong>
            <span class="node-index">${String(i + 1).padStart(2, "0")}</span>
          </div>`).join("")}
      </aside>`;
    }

    function formHref() {
      return config.formUrl || "#";
    }

    function formIsPlaceholder() {
      return !config.formUrl || config.formUrl.includes("REPLACE_WITH_YOUR_FORM");
    }

    function renderIntro(slide, index) {
      return `<div class="cover-layout">
        ${topLine(slide, index)}
        <div class="cover-body">
          <div class="cover-copy">
            <p class="eyebrow">Practical AI for real business work</p>
            <h1 class="cover-title">${slide.title}</h1>
            <p class="lead">${slide.bottom || "AI should improve execution, not add noise."}</p>
          </div>
          <aside class="credential-panel">
            <h2>${config.presenter || slide.bullets[0]}</h2>
            <ul class="credential-list">${slide.bullets.slice(1).map((item) => `<li>${item}</li>`).join("")}</ul>
          </aside>
        </div>
        <p class="takeaway">Workshop lens: diagnose the workflow before choosing the tool.</p>
      </div>`;
    }

    function renderAgenda(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="agenda-track">${slide.bullets.map((item, i) => `
            <article class="agenda-step">
              <span>${String(i + 1).padStart(2, "0")}</span>
              <strong>${item}</strong>
            </article>`).join("")}</div>
        </div>
        <p class="takeaway">Outcome: each attendee leaves with one practical AI workflow candidate.</p>
      </div>`;
    }

    function renderSplit(slide, index) {
      return `<div class="split-layout">
        ${topLine(slide, index)}
        <div class="split-body">
          <div class="hero-copy">
            <h1 class="title">${slide.title}</h1>
            <p class="lead">${slide.bottom || "Start with the business bottleneck."}</p>
          </div>
          ${blueprintPanel(slide.kicker, slide.bullets, slide.icon)}
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderLeaks(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="leak-map">${slide.bullets.map((item, i) => `
            <div class="leak-row">
              <span>${i + 1}</span>
              <strong>${item}</strong>
              ${icon("alert")}
            </div>`).join("")}</div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderProcess(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="process-rail">${slide.bullets.map((item, i) => `
            <article class="process-step" data-step="Step ${i + 1}">
              ${icon(slide.icon)}
              <strong>${item}</strong>
            </article>`).join("")}</div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderStatement(slide, index) {
      return `<div class="statement-layout">
        ${topLine(slide, index)}
        <h1 class="statement-rule">${slide.statement}</h1>
        ${artifactCards(slide.bullets, slide.icon)}
      </div>`;
    }

    function renderTable(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <table class="tool-table">
            <thead><tr><th>Tool</th><th>Best first use</th></tr></thead>
            <tbody>${slide.rows.map((row) => `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join("")}</tbody>
          </table>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderFormula(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="formula-row">${slide.formula.map((part) => `<div class="formula-item">${part}</div>`).join("")}</div>
          <div class="prompt-box">${slide.example}</div>
        </div>
        <p class="takeaway">A prompt is a work order. Give it enough structure to be useful.</p>
      </div>`;
    }

    function renderCompare(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="compare-grid">
            <article class="compare-card weak"><strong>${slide.leftLabel}</strong><p>${slide.left}</p></article>
            <article class="compare-card"><strong>${slide.rightLabel}</strong><p>${slide.right}</p></article>
          </div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderNumbered(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="rule-grid">${slide.bullets.map((item, i) => `
            <article class="rule-card">
              <span>${String(i + 1).padStart(2, "0")}</span>
              <strong>${item}</strong>
            </article>`).join("")}</div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderDemo(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="demo-grid">
            <article class="demo-box scenario"><span class="label">Scenario</span><p>${slide.scenario}</p></article>
            <article class="demo-box prompt"><span class="label">Prompt architecture</span><p>${slide.prompt}</p></article>
          </div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderQuestions(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="topic-title">${slide.title}</h1>
          <div class="question-list">${slide.bullets.map((item, i) => `
            <div class="question-card"><span>${String(i + 1).padStart(2, "0")}</span>${item}</div>`).join("")}</div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderWorksheet(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="topic-title">${slide.title}</h1>
          <div class="field-grid">${slide.fields.map((field) => `<div class="field-card">${field}</div>`).join("")}</div>
        </div>
        <p class="takeaway">This becomes the intake for a useful workflow review.</p>
      </div>`;
    }

    function renderRoadmap(slide, index) {
      return `<div class="briefing-layout">
        ${topLine(slide, index)}
        <div>
          <h1 class="title">${slide.title}</h1>
          <div class="roadmap-grid">${slide.bullets.map((item, i) => `
            <article class="roadmap-card">
              <span>Session ${i + 1}</span>
              <strong>${item.replace(/^Session \d+: /, "")}</strong>
            </article>`).join("")}</div>
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderCta(slide, index) {
      const placeholder = formIsPlaceholder();
      return `<div class="cta-layout">
        ${topLine(slide, index)}
        <div class="cta-body">
          <div class="hero-copy">
            <p class="eyebrow">Free workflow review</p>
            <h1 class="topic-title">${slide.title}</h1>
            <p class="lead">${slide.cta}</p>
            ${artifactCards(slide.bullets, "checklist")}
            <div class="cta-actions">
              <a class="cta-button" href="${placeholder ? "#" : formHref()}" target="_blank" rel="noreferrer">${placeholder ? "Add Tally form URL" : "Open workflow review form"}</a>
              <span class="placeholder-note">${placeholder ? "Replace deckConfig.formUrl in slides.js before publishing." : `Responses collected with ${config.formProvider || "the form"}.`}</span>
            </div>
          </div>
          <aside class="qr-card"><img src="assets/worksheet-qr.svg" alt="QR code linking to the AI workflow review worksheet"></aside>
        </div>
        <p class="takeaway">${slide.success || "You will get one recommended next step."}</p>
      </div>`;
    }

    function renderGeneric(slide, index) {
      const compact = slide.bullets && slide.bullets.length > 6 ? "compact" : "";
      return `<div class="split-layout">
        ${topLine(slide, index)}
        <div class="split-body">
          <div class="hero-copy">
            <h1 class="title">${slide.title}</h1>
            ${slide.example ? `<div class="prompt-box">${slide.example}</div>` : `<p class="lead">${slide.bottom || "Use this as a practical operating rule."}</p>`}
          </div>
          ${artifactCards(slide.bullets || [], slide.icon, compact)}
        </div>
        ${takeaway(slide)}
      </div>`;
    }

    function renderSlide(slide, index) {
      const type = slide.type;
      let body = "";

      if (type === "intro") body = renderIntro(slide, index);
      else if (type === "agenda") body = renderAgenda(slide, index);
      else if (["split", "outcomes", "capabilities"].includes(type)) body = renderSplit(slide, index);
      else if (type === "leaks") body = renderLeaks(slide, index);
      else if (type === "process") body = renderProcess(slide, index);
      else if (type === "warning") body = renderGeneric({ ...slide, bullets: slide.bullets.map((item) => `Cannot ${item.charAt(0).toLowerCase() + item.slice(1)}`) }, index);
      else if (type === "statement") body = renderStatement(slide, index);
      else if (type === "table") body = renderTable(slide, index);
      else if (type === "formula") body = renderFormula(slide, index);
      else if (type === "compare") body = renderCompare(slide, index);
      else if (type === "numbered") body = renderNumbered(slide, index);
      else if (type === "demo") body = renderDemo(slide, index);
      else if (type === "questions") body = renderQuestions(slide, index);
      else if (type === "worksheet") body = renderWorksheet(slide, index);
      else if (type === "roadmap") body = renderRoadmap(slide, index);
      else if (type === "cta") body = renderCta(slide, index);
      else body = renderGeneric(slide, index);

      return `<article class="slide" data-slide="${index}" aria-label="Slide ${index + 1}">${body}${slideNumber(index)}</article>`;
    }

    function renderDeck() {
      stage.innerHTML = window.deckSlides.map(renderSlide).join("");
      updateSlide();
    }

    function updateSlide() {
      document.querySelectorAll(".slide").forEach((slide, i) => slide.classList.toggle("active", i === current));
      progressBar.style.width = `${((current + 1) / window.deckSlides.length) * 100}%`;
      const slide = window.deckSlides[current];
      notesPanel.innerHTML = `<h2>${current + 1}. ${slide.title}</h2><p>${slide.notes || "No speaker notes."}</p><p class="hint">Use left/right arrows to navigate. Press N for notes.</p>`;
      location.hash = `slide-${current + 1}`;
    }

    function go(delta) {
      current = Math.max(0, Math.min(window.deckSlides.length - 1, current + delta));
      updateSlide();
    }

    document.getElementById("prev").addEventListener("click", () => go(-1));
    document.getElementById("next").addEventListener("click", () => go(1));
    document.getElementById("notesToggle").addEventListener("click", () => notesPanel.classList.toggle("open"));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        go(1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        go(-1);
      }
      if (event.key.toLowerCase() === "n") notesPanel.classList.toggle("open");
      if (event.key.toLowerCase() === "f" && document.fullscreenEnabled) document.documentElement.requestFullscreen();
    });

    const match = location.hash.match(/slide-(\d+)/);
    if (match) current = Math.max(0, Math.min(window.deckSlides.length - 1, Number(match[1]) - 1));
    renderDeck();
  </script>
</body>
</html>
